<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <meta property="og:title" content="Bolt Texturas" />
    <meta property="og:description" content="O maior criador de texturas..." />
    <meta property="og:image" content="https://raw.githubusercontent.com/victorndesigner/oncehuman/main/img/icon.png" />
    <meta property="og:url" content="https://bolttexturas.site/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="bolttexturas" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image:alt" content="Banner Bolt Texturas" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/victorndesigner/oncehuman/main/img/icon.png">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/victorndesigner/oncehuman/main/img/icon.png">
    <meta name="theme-color" content="#8c00ff" />
    <title>Download • bolttexturas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #c773ff;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        #status {
            font-size: 14px;
            color: var(--accent);
            margin-top: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .success-icon {
            font-size: 50px;
            color: var(--success);
            margin-bottom: 20px;
            display: none;
        }

        .main-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: none;
            margin-top: 20px;
        }

        .main-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo" id="main-logo">💜</div>
        <div class="success-icon" id="success-icon"><i class="fas fa-check-circle"></i></div>
        <h1 id="title">Verificando...</h1>
        <p id="desc">Validando seu acesso ao download.</p>
        <div id="loading-area">
            <div class="loader"></div>
            <div id="status">Conectando ao App...</div>
        </div>
        <button class="main-btn" id="action-btn">Fechar Página</button>
    </div>

    <script>
        // Bloqueio Básico de Inspeção e Cópia
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'p')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
    <script>
        // CONFIGURAÇÃO
        const API_URL = 'https://texturasbolt.onrender.com';

        // Função para tentar recuperar parâmetros (Query ou Hash)
        function getParams() {
            const urlParams = new URLSearchParams(window.location.search);

            // Se achou query params, retorna
            if (urlParams.has('hwid')) return urlParams;

            // Se não, tenta pegar do hash (ex: /#type=texture&id=...)
            if (window.location.hash) {
                const hash = window.location.hash.substring(1); // Remove o #
                return new URLSearchParams(hash);
            }

            return new URLSearchParams(); // Vazio
        }

        const params = getParams();

        // Elementos
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');
        const status = document.getElementById('status');
        const loadingArea = document.getElementById('loading-area');
        const successIcon = document.getElementById('success-icon');
        const mainLogo = document.getElementById('main-logo');
        const actionBtn = document.getElementById('action-btn');

        async function init() {
            let token = params.get('token');
            let hwid = params.get('hwid');
            const goUrl = params.get('go'); // Parâmetro para modo bridge

            console.log('--- Bolt Texturas Download ---');

            // --- MODO BRIDGE: Se vem do App com 'go', salva e redireciona ---
            if (token && hwid && goUrl) {
                localStorage.setItem('bolt_dl_token', token);
                localStorage.setItem('bolt_dl_hwid', hwid);
                console.log('Bridge: Salvando credenciais e redirecionando...');
                window.location.replace(decodeURIComponent(goUrl));
                return;
            }

            // --- RECOVERY: Se não tem params, tenta pegar do localStorage ---
            if (!token || !hwid) {
                token = localStorage.getItem('bolt_dl_token');
                hwid = localStorage.getItem('bolt_dl_hwid');
            }

            await new Promise(r => setTimeout(r, 1000));

            if (!token || !hwid) {
                showError('Parâmetros ausentes. Use o link do Aplicativo.');
                return;
            }

            // Anti-F5: Salva o token usado localmente para marcar como "concluído" nesta aba
            const requestKey = `bolt_dl_done_${token}`;
            if (localStorage.getItem(requestKey)) {
                localStorage.removeItem('bolt_dl_token'); // Limpa após uso
                localStorage.removeItem('bolt_dl_hwid');
                finishSuccess();
                return;
            }

            handleRelease(token, hwid);
        }

        async function handleRelease(token, hwid) {
            try {
                status.innerText = 'Validando ticket...';
                const res = await fetch(`${API_URL}/api/verify-download?token=${token}&hwid=${hwid}`);
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem(`bolt_dl_done_${token}`, 'true');
                    localStorage.removeItem('bolt_dl_token'); // Limpa credenciais temporárias
                    localStorage.removeItem('bolt_dl_hwid');
                    finishSuccess();
                } else {
                    showError(data.error || 'Ticket inválido ou já utilizado.');
                }
            } catch (e) {
                showError('Erro ao comunicar com o servidor.');
            }
        }

        function showError(msg) {
            const debugInfo = `\n\nURL: ${window.location.href}\nParams: ${params.toString() || 'Nenhum'}`;
            console.error('Erro:', msg, debugInfo);
            loadingArea.innerHTML = `<div style="color: #ff4d4d; font-weight: 700; white-space: pre-wrap;">❌ ${msg}</div>`;
            title.innerText = 'Falha no Download';
            desc.innerText = 'Não foi possível liberar o arquivo.';
        }

        init();
    </script>
</body>

</html>
