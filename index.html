<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <meta property="og:title" content="Bolt Texturas" />
    <meta property="og:description" content="O maior criador de texturas..." />
    <meta property="og:image" content="https://raw.githubusercontent.com/victorndesigner/oncehuman/main/img/icon.png" />
    <meta property="og:url" content="https://bolttexturas.site/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="bolttexturas" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image:alt" content="Banner Bolt Texturas" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/victorndesigner/oncehuman/main/img/icon.png">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/victorndesigner/oncehuman/main/img/icon.png">
    <meta name="theme-color" content="#8c00ff" />
    <title>Download • bolttexturas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #c773ff;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        #status {
            font-size: 14px;
            color: var(--accent);
            margin-top: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .success-icon {
            font-size: 50px;
            color: var(--success);
            margin-bottom: 20px;
            display: none;
        }

        .main-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: none;
            margin-top: 20px;
        }

        .main-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo" id="main-logo">💜</div>
        <div class="success-icon" id="success-icon"><i class="fas fa-check-circle"></i></div>
        <h1 id="title">Verificando...</h1>
        <p id="desc">Validando seu acesso ao download.</p>
        <div id="loading-area">
            <div class="loader"></div>
            <div id="status">Conectando ao App...</div>
        </div>
        <button class="main-btn" id="action-btn">Fechar Página</button>
    </div>

    <script>
        // Bloqueio Básico de Inspeção e Cópia
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'p')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
    <script>
        // CONFIGURAÇÃO
        const API_URL = 'https://api-texture.vertraweb.app';

        // Lê params da URL (suporta query string e hash)
        function getParam(name) {
            const qs = new URLSearchParams(window.location.search);
            if (qs.has(name)) return qs.get(name);
            const hash = new URLSearchParams(window.location.hash.substring(1));
            return hash.get(name) || null;
        }

        // Elementos
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');
        const status = document.getElementById('status');
        const loadingArea = document.getElementById('loading-area');
        const successIcon = document.getElementById('success-icon');
        const mainLogo = document.getElementById('main-logo');
        const actionBtn = document.getElementById('action-btn');

        const pageLoadTime = Date.now();

        async function init() {
            const hwid = getParam('hwid');
            const textureId = getParam('textureId');
            const token = getParam('token');
            const referrer = document.referrer.toLowerCase();

            console.log('--- Bolt Texturas Download ---');
            console.log('HWID:', hwid, '| TextureID:', textureId, '| Token:', token);

            // --- PROTEÇÃO RIGOROSA CONTRA BURLA (REFERRER) ---
            const isFromEncurtador = referrer.includes('linkvertise.com') || referrer.includes('link-target.net');
            const isFromSelf = referrer.includes('bolttexturas.site') || referrer.includes('caminhodesperto.com') || referrer.includes('localhost'); // Localhost apenas para dev

            if (!isFromEncurtador && !isFromSelf) {
                showError('Acesso Direto Negado. Você tentou burlar o encurtador ou abriu em uma nova aba. \n\nConclua o processo no Linkvertise para liberar seu download.');
                return;
            }

            // Sem parâmetros = Pode ser que o encurtador limpou a URL.
            // Vamos tentar validar pelo IP (Fallback Automático no Servidor)
            if (!token && !hwid && !textureId) {
                console.warn('URL sem parâmetros. Tentando validação por IP...');
                status.innerText = 'Validando via IP...';
            }

            // Anti-burla: deve ter ficado pelo menos 1.5s na página do encurtador (simulado)
            await new Promise(r => setTimeout(r, 1500));

            await handleConfirm(hwid, textureId, token);
        }

        async function handleConfirm(hwid, textureId, token) {
            try {
                status.innerText = 'Confirmando validação...';
                let url = `${API_URL}/api/download/confirm?hwid=${encodeURIComponent(hwid)}&textureId=${encodeURIComponent(textureId)}`;
                if (token) url += `&token=${encodeURIComponent(token)}`;
                
                const res = await fetch(url);
                const data = await res.json();

                if (res.ok && data.success) {
                    finishSuccess();
                } else {
                    showError(data.error || 'Sessão expirada ou já utilizada. Reinicie o download no App (este processo deve ser feito pelo PC).');
                }
            } catch (e) {
                console.error('Fetch error:', e);
                showError(`Erro ao comunicar com o servidor: ${e.message}`);
            }
        }

        function finishSuccess() {
            mainLogo.style.display = 'none';
            successIcon.style.display = 'block';
            loadingArea.style.display = 'none';
            title.innerText = 'Download Pronto!';
            desc.innerText = 'Seu download iniciará no App automaticamente.';
            actionBtn.style.display = 'block';
            actionBtn.onclick = () => {
                actionBtn.innerText = 'Pode fechar esta aba';
                actionBtn.style.background = '#333';
                actionBtn.disabled = true;
                window.close(); // Tenta fechar (se permitido)
            };
        }

        function showError(msg) {
            console.error('Erro:', msg);
            loadingArea.innerHTML = `<div style="color: #ff4d4d; font-weight: 700; font-size: 13px; white-space: pre-wrap; line-height: 1.5;">❌ ${msg.replace(/\n\n/g, '\n')}</div>`;
            title.innerText = 'Falha no Download';
            desc.innerText = 'Não foi possível liberar o arquivo.';
        }

        init();
    </script>
</body>

</html>
